name: Deploy a quest.sinilos.com

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Copy dist + restart via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERED_HOST }}
          username: ${{ secrets.SERED_USER }}
          key: ${{ secrets.SERED_SSH_KEY }}
          port: 1020
          script: |
            cd ~/repositories/pacfgm-quest
            git pull origin main
            rsync -a --exclude=node_modules --exclude=.env --exclude=tmp --exclude='*.log' \
              ~/repositories/pacfgm-quest/backend/. ~/quest.sinilos.com/
            mkdir -p ~/quest.sinilos.com/tmp
            touch ~/quest.sinilos.com/tmp/restart.txt
            echo "Deploy completat: $(git log --oneline -1)"

      - name: Upload dist via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERED_HOST }}
          username: ${{ secrets.SERED_USER }}
          key: ${{ secrets.SERED_SSH_KEY }}
          port: 1020
          source: "frontend/dist/*"
          target: "/home/r307889/quest.sinilos.com/public/"
          strip_components: 2
